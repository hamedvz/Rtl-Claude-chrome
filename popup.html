<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>اصلاح راست‌چین فارسی</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="" />
    <h1>راست‌چین فارسی و فونت وزیر</h1>
  </header>

  <main>
    <label class="switch-row">
      <span>فعال در همه‌ی وب‌سایت‌ها</span>
      <span class="switch">
        <input type="checkbox" id="enabled-toggle" />
        <span class="slider"></span>
      </span>
    </label>

    <p class="hint">
      متن‌های فارسی در همه‌ی صفحات وب و چت کلاود به‌صورت خودکار راست‌چین شده و با فونت وزیر نمایش داده می‌شوند.
      برای اعمال تغییرات روی تب‌های باز، صفحه را تازه‌سازی کنید.
    </p>

    <button id="reload-tab">تازه‌سازی تب فعلی</button>
  </main>
</body>
</html>
